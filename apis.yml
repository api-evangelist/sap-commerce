apis:
  - aid: sap-commerce:sap-commerce-occ-api
    name: SAP Commerce Cloud OCC API
    description: The Omni Commerce Connect (OCC) REST API exposes a broad set of commerce and data services, enabling integration of SAP Commerce functionality anywhere in the application landscape. OCC v2 is the default stateless REST API covering products, catalogs, carts, orders, users, and more.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://help.sap.com/docs/SAP_COMMERCE/e5d7cec9064f453b84235dc582b886da/8c19ab00866910148f87bf32d4a60d38.html
    baseURL: https://{host}/occ/v2/{baseSiteId}
    tags:
      - OCC
      - REST
      - E-Commerce
      - Products
      - Carts
      - Orders
      - Customers
      - Catalogs
