        url: https://help.sap.com/docs/SAP_COMMERCE_CLOUD_PUBLIC_CLOUD/452dcbb0e00f47e88a69cdaeb87a925d/66abfe678b55457fab235ce8039dda71.html
    contact:
      - FN: SAP Commerce Support
        url: https://support.sap.com/en/index.html
  - aid: sap-commerce:sap-commerce-cloud-portal-api
    name: SAP Commerce Cloud Portal API
    description: The SAP Commerce Cloud Portal API provides programmatic access to manage cloud environments, deployments, builds, and configurations within the SAP Commerce Cloud control plane.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://help.sap.com/docs/SAP_COMMERCE_CLOUD_PUBLIC_CLOUD/452dcbb0e00f47e88a69cdaeb87a925d/66abfe678b55457fab235ce8039dda71.html
    baseURL: https://api.cloud.cx.sap.com
